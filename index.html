<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>岸和田市職労選挙システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --ink:#1c2b3a;
  --ink-soft:#4a5a68;
  --ground:#eef1f2;
  --card:#ffffff;
  --line:#c9d0d4;
  --indigo:#33547a;
  --shu:#be3a2b;
  --mincho:"Zen Old Mincho","Yu Mincho","Hiragino Mincho ProN",serif;
  --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--ground);
  color:var(--ink);
  line-height:1.6;
}
.wrap{max-width:640px;margin:0 auto;padding:0 12px 80px}

header{
  padding:28px 4px 14px;
}
.title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
h1{
  font-family:var(--mincho);
  font-weight:900;
  font-size:1.5rem;
  letter-spacing:.12em;
}
.subtitle{
  font-size:.72rem;
  color:var(--ink-soft);
  letter-spacing:.15em;
}
.searchbar{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--ground);
  padding:8px 0 12px;
}
.searchbox{
  display:flex;
  align-items:center;
  background:var(--card);
  border:2px solid var(--ink);
  border-radius:6px;
  overflow:hidden;
}
.searchbox svg{margin:0 10px 0 14px;flex:none;opacity:.55}
input[type=search]{
  appearance:none;-webkit-appearance:none;
  border:0;outline:0;
  width:100%;
  padding:13px 12px 13px 0;
  font-size:1.05rem;
  font-family:var(--sans);
  background:transparent;
  color:var(--ink);
}
input[type=search]::placeholder{color:#9aa6ae}
input[type=search]:focus-visible{outline:none}
.searchbox:focus-within{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(51,84,122,.18)}
.count{
  font-size:.72rem;
  color:var(--ink-soft);
  letter-spacing:.08em;
  padding:6px 4px 0;
}

/* 台帳リスト */
#list{background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.row{border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row-head{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:11px 14px;
  background:none;border:0;
  font:inherit;color:inherit;
  text-align:left;
  cursor:pointer;
}
.row-head:focus-visible{outline:3px solid var(--indigo);outline-offset:-3px}
.kana{
  flex:none;
  width:2.4em;
  font-size:.68rem;
  color:var(--ink-soft);
  letter-spacing:.1em;
}
.name{
  font-family:var(--mincho);
  font-weight:700;
  font-size:1.12rem;
  letter-spacing:.06em;
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.name mark{background:none;color:var(--shu)}
.shibu{
  flex:none;
  font-size:.7rem;
  color:var(--indigo);
  border:1px solid currentColor;
  border-radius:3px;
  padding:1px 7px;
  letter-spacing:.08em;
}
.terms{
  flex:none;
  width:4.2em;
  text-align:right;
  font-size:.85rem;
  color:var(--ink-soft);
  font-variant-numeric:tabular-nums;
}
.terms b{color:var(--ink);font-size:1.05rem}

/* 詳細カード */
.detail{
  display:none;
  padding:4px 16px 18px;
  position:relative;
}
.row.open .detail{display:block}
.row.open{background:#fbfcfc}
.org{margin-top:12px}
.org-name{
  font-size:.72rem;
  color:var(--indigo);
  letter-spacing:.15em;
  border-left:3px solid var(--indigo);
  padding-left:8px;
  margin-bottom:4px;
}
.role-line{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:3px 0 3px 11px;
  font-size:.92rem;
  border-bottom:1px dotted var(--line);
}
.role-line .t{font-variant-numeric:tabular-nums}
.role-line .t b{font-size:1.05rem}
.total-line{
  margin-top:16px;
  padding-top:10px;
  border-top:2px solid var(--ink);
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-family:var(--mincho);
  font-weight:700;
}
.total-line .t{font-size:1.3rem}
.memo{
  margin-top:10px;
  font-size:.8rem;
  color:var(--ink-soft);
}
.memo::before{content:"備考　";color:var(--indigo);letter-spacing:.1em}

/* 次期役員 */
.next-box{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.pick-label{font-size:.75rem;color:var(--ink-soft);letter-spacing:.08em}
.next-btn,.chip{font-family:var(--sans);font-size:.8rem;color:var(--indigo);background:var(--card);border:1px solid var(--indigo);border-radius:4px;padding:4px 10px;cursor:pointer}
.next-btn{border-style:dashed}
.chip:hover,.next-btn:hover{background:var(--indigo);color:#fff}
.chip.cancel{color:var(--ink-soft);border-color:var(--line)}
.next-badge{display:inline-flex;align-items:center;gap:4px;background:var(--indigo);color:#fff;font-size:.75rem;border-radius:4px;padding:3px 6px 3px 9px;letter-spacing:.05em}
.bx{background:none;border:0;color:inherit;cursor:pointer;font-size:.95rem;line-height:1;padding:0 2px}
/* 支部フィルタ */
.shibu-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 0}
.sf{font-family:var(--sans);font-size:.78rem;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:4px 12px;cursor:pointer;letter-spacing:.05em}
.sf.on{background:var(--indigo);border-color:var(--indigo);color:#fff}

.countbar{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 0}
.countbar .count{padding:0}
#stockBtn{font-family:var(--sans);font-size:.75rem;color:var(--indigo);background:none;border:1px solid var(--indigo);border-radius:4px;padding:3px 10px;cursor:pointer;letter-spacing:.05em}
#stockBtn.has{background:var(--indigo);color:#fff}
.stock-panel{background:var(--card);border:2px solid var(--indigo);border-radius:8px;padding:6px 16px 16px;margin-bottom:12px}
.stock-line{display:flex;align-items:center;gap:8px;padding:4px 0 4px 4px;font-size:.92rem;border-bottom:1px dotted var(--line)}
.stock-line .lbl{flex:1;min-width:0}
.selc{flex:none;width:22px;height:22px;border:2px solid var(--indigo);border-radius:50%;background:var(--card);cursor:pointer;color:transparent;font-size:.85rem;line-height:1;padding:0}
.selc.on{background:var(--indigo);color:#fff}
.sel-tools{display:flex;gap:8px;align-items:center;padding:12px 0 4px}
.sel-tools .cnt{font-size:.72rem;color:var(--ink-soft);margin-left:auto}
.sel-tools button{font-family:var(--sans);font-size:.75rem;color:var(--indigo);background:var(--card);border:1px solid var(--indigo);border-radius:4px;padding:3px 12px;cursor:pointer}
.sel-tools.orgs{flex-wrap:wrap}
.sel-tools .orgc{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;padding:6px 12px}
.sel-tools .orgc .selc{width:18px;height:18px;border-width:2px;pointer-events:none}
.sel-tools .orgc.on{background:#eef3f9}
#goBtn{background:var(--indigo);color:#fff;font-weight:700}
#cancelSel{color:var(--ink-soft);border-color:var(--line)}
.ed{background:none;border:0;color:var(--indigo);cursor:pointer;font-size:1rem;padding:0 6px;flex:none}
.nmedit,.wkedit{font:inherit;font-size:.9rem;border:1px solid var(--indigo);border-radius:4px;padding:2px 8px;width:9em;max-width:44%}
.stock-line.edit .lbl{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.edok,.edng{font-family:var(--sans);font-size:.72rem;border-radius:4px;padding:3px 10px;cursor:pointer;flex:none}
.edok{background:var(--indigo);color:#fff;border:1px solid var(--indigo)}
.edng{background:var(--card);color:var(--ink-soft);border:1px solid var(--line)}

/* プレビュー */
.pv-overlay{position:fixed;inset:0;background:rgba(28,43,58,.65);z-index:100;overflow:auto;padding:14px}
.pv-box{max-width:780px;margin:0 auto;background:#fff;border-radius:8px;padding:10px 12px 16px}
.pv-head{display:flex;justify-content:space-between;align-items:center;padding:2px 2px 10px}
#pvClose{font-family:var(--sans);font-size:.8rem;color:#fff;background:var(--indigo);border:1px solid var(--indigo);border-radius:4px;padding:5px 16px;cursor:pointer}
.pv-page{border:1px solid var(--line);margin:0 auto 14px;overflow:hidden}
.pv-ballot{width:688px;min-height:971px;padding:24px;transform-origin:top left;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
.pv-list{padding:6px 4px}
.pv-list h2{margin-top:14px}
.pv-list table{margin-top:4px}
#prevBtn{font-family:var(--sans);font-size:.75rem;color:var(--indigo);background:var(--card);border:1px solid var(--indigo);border-radius:4px;padding:3px 12px;cursor:pointer;margin-left:auto}
.stock-line .bx{color:var(--shu)}
.stock-empty{padding:14px 4px 8px;font-size:.8rem;color:var(--ink-soft)}

/* PDF出力（印刷シート） */
.stock-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:12px}
#ballotBtn{font-family:var(--sans);font-size:.8rem;color:var(--indigo);background:var(--card);border:1px solid var(--indigo);border-radius:4px;padding:6px 16px;cursor:pointer;letter-spacing:.1em}
#pdfBtn{font-family:var(--sans);font-size:.8rem;color:#fff;background:var(--indigo);border:1px solid var(--indigo);border-radius:4px;padding:6px 16px;cursor:pointer;letter-spacing:.1em}
#printSheet{display:none}
.psheet{background:#fff;color:#000;font-family:var(--sans)}
.psheet h1{font-family:var(--mincho);font-size:16pt;letter-spacing:.15em;margin-bottom:2mm}
.psheet .pdate{font-size:9pt;text-align:right;margin-bottom:4mm}
.psheet h2{font-family:var(--mincho);font-size:12pt;letter-spacing:.1em;margin:5mm 0 2mm;border-left:3mm solid #000;padding-left:2mm}
.psheet table{width:100%;border-collapse:collapse;font-size:10pt}
.psheet th,.psheet td{border:1px solid #333;padding:1.5mm 2mm;text-align:left;vertical-align:top}
.psheet th{font-weight:700;background:#eee;white-space:nowrap}
.psheet td.po,.psheet td.pn,.psheet td.pb{white-space:nowrap}
.psheet td.pn{font-family:var(--mincho);font-weight:700}
#printSheet.capture{display:block;position:fixed;left:-10000px;top:0;width:794px;padding:30px;z-index:-1}
#printSheet.ballot{width:688px;min-height:971px;padding:24px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
.psheet .bwrap{border:2px solid #000;min-height:919px;padding:14px 16px;display:flex;flex-direction:column}
.psheet .btitle{background:repeating-linear-gradient(0deg,#e0e0e0 0 3px,#fff 3px 7px);border-top:1px solid #000;border-bottom:1px solid #000;font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;font-weight:900;font-size:42px;text-align:center;padding:10px 0;letter-spacing:1px;white-space:nowrap}
.psheet .bsub{color:#c00;font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;font-weight:900;font-size:22px;text-align:center;margin:56px 0 6px}
.psheet table.btable{width:100%;border-collapse:collapse;font-size:17px}
.psheet .btable th,.psheet .btable td{border:1.5px solid #000;padding:6px 10px;height:34px;vertical-align:middle;font-weight:700}
.psheet .btable th{font-weight:700}
.psheet .btable .cRole{width:26%}
.psheet .btable .cName{width:27%}
.psheet .btable .cWork{width:32%}
.psheet .btable .cVote{width:15%}
.psheet .jrow{display:flex;justify-content:space-between}
.psheet .jone{display:block;text-align:center}
.psheet .bnotes{margin-top:auto;padding-top:24px;font-size:15px;line-height:1.9}
.psheet .bsign{text-align:right;margin-top:10px}
@media print{
  .wrap{display:none}
  #printSheet{display:block}
}

.empty{
  padding:48px 20px;
  text-align:center;
  color:var(--ink-soft);
}
.empty .big{font-family:var(--mincho);font-size:1.1rem;margin-bottom:6px}

footer{
  padding:24px 4px;
  font-size:.68rem;
  color:var(--ink-soft);
  letter-spacing:.1em;
  text-align:center;
}

@media (prefers-reduced-motion:no-preference){
  .detail{animation:none}
}
@media (max-width:420px){
  .kana{display:none}
  h1{font-size:1.3rem}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="title-row">
    <h1>岸和田市職労選挙システム</h1>
    <span class="subtitle">歴代役員名簿　二〇二六年度時点</span>
  </div>
</header>

<div class="searchbar">
  <div class="searchbox">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input type="search" id="q" placeholder="名前（漢字・ひらがな）" autocomplete="off" autofocus>
  </div>
  <div class="shibu-bar" id="shibuBar">
    <button class="sf on" data-b="">全部</button>
    <button class="sf" data-b="本庁">本庁</button>
    <button class="sf" data-b="学校">学校</button>
    <button class="sf" data-b="水道">水道</button>
    <button class="sf" data-b="現業">現業</button>
    <button class="sf" data-b="病院">病院</button>
    <button class="sf" data-b="保育所">保育所</button>
    <button class="sf" data-b="関連評">関連評</button>
  </div>
  <div class="countbar"><div class="count" id="count"></div><button id="stockBtn">次期役員（0）</button></div>
</div>

<div id="stockPanel" class="stock-panel" hidden></div>

<div id="list"></div>

<footer>役員歴は期数（年数）。名簿データより自動生成。 v4</footer>
</div>

<div id="printSheet" class="psheet"></div>

<div id="pvOverlay" class="pv-overlay" hidden>
  <div class="pv-box">
    <div class="pv-head"><b id="pvTitle">プレビュー</b><button id="pvClose">閉じる</button></div>
    <div id="pvBody"></div>
  </div>

<script>
const PEOPLE = JSON.parse(document.getElementById('data').textContent);
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');
const qEl = document.getElementById('q');

function hira(s){
  return s.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function norm(s){ return hira(s.trim().replace(/[\s　]/g,'')); }

function match(p, q){
  if(!q) return true;
  const full = p.s + p.m;
  if(full.includes(q)) return true;
  const hq = norm(q);
  if(!/^[ぁ-ゖー]+$/.test(hq)) return false;
  if(p.k && (p.k.startsWith(hq) || (hq.length >= p.k.length && hq.startsWith(p.k)))) return true;
  return false;
}

function esc(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function highlight(name, q){
  if(!q) return esc(name);
  const i = name.indexOf(q);
  if(i < 0) return esc(name);
  return esc(name.slice(0,i)) + '<mark>' + esc(name.slice(i, i+q.length)) + '</mark>' + esc(name.slice(i+q.length));
}

function detailHTML(p, i){
  const orgs = [];
  let cur = null;
  for(const r of p.roles){
    if(!cur || cur.g !== r.g){ cur = {g:r.g, items:[]}; orgs.push(cur); }
    cur.items.push(r);
  }
  let h = '';
  if(!orgs.length) h += '<div class="org"><div class="org-name">役員歴なし</div></div>';
  for(const o of orgs){
    h += '<div class="org"><div class="org-name">' + esc(o.g) + '</div>';
    for(const it of o.items){
      h += '<div class="role-line"><span>' + esc(it.r) + '</span><span class="t"><b>' + esc(String(it.t)) + '</b> 期</span></div>';
    }
    h += '</div>';
  }
  h += '<div class="total-line"><span>通算</span><span class="t">' + p.total + ' 期</span></div>';
  if(p.memo) h += '<div class="memo">' + esc(p.memo) + '</div>';
  h += nextHTML(p, i);
  return h;
}

let shibuFilter = '';
function render(){
  const q = qEl.value.trim();
  const hits = PEOPLE.filter(p => match(p, q) && (!shibuFilter || p.b === shibuFilter));
  countEl.textContent = (q || shibuFilter) ? `該当 ${hits.length} 名 / 全 ${PEOPLE.length} 名` : `全 ${PEOPLE.length} 名`;
  if(hits.length === 0){
    listEl.innerHTML = '<div class="empty"><div class="big">該当なし</div>漢字の姓名か、ひらがなで入力してください</div>';
    return;
  }
  const autoOpen = hits.length === 1;
  listEl.innerHTML = hits.map((p, i) => {
    const disp = p.s + '　' + p.m;
    const pi = PEOPLE.indexOf(p);
    return '<div class="row' + (autoOpen ? ' open' : '') + '" data-i="' + pi + '">' +
      '<button class="row-head" aria-expanded="' + autoOpen + '">' +
        '<span class="kana">' + esc(p.k.slice(0, 2)) + '</span>' +
        '<span class="name">' + highlight(disp, q) + '</span>' +
        '<span class="shibu">' + esc(p.b) + '</span>' +
        '<span class="terms"><b>' + p.total + '</b> 期</span>' +
      '</button>' +
      '<div class="detail">' + (autoOpen ? detailHTML(p, pi) : '') + '</div>' +
    '</div>';
  }).join('');
}

// ---- 次期役員ストック ----
const stockBtn = document.getElementById('stockBtn');
const stockPanel = document.getElementById('stockPanel');
const ROLES = ['執行委員長','副執行委員長','書記長','書記次長','執行委員','会計監査'];
const SEINEN_ROLES = ['部長','副部長','書記長','書記次長','常任幹事'];
let STOCK = [];
try{ STOCK = JSON.parse(localStorage.getItem('yakuin_jiki') || '[]'); }catch(err){}
function saveStock(){ localStorage.setItem('yakuin_jiki', JSON.stringify(STOCK)); }
function personKey(p){ return p.s + '｜' + p.m; }
// 名簿修正で漢字が変わった人の読み替え表
const PID_ALIAS = {
  '吉川｜朋子': '吉川｜明子',
  '久瀧｜警唯': '久瀧｜誓唯',
  '春崎｜孝雄': '春﨑｜孝雄',
  '高﨑｜一哉': '髙﨑｜一哉',
  '高田｜真有': '髙田｜真有',
  '尾崎｜明美': '尾﨑｜明美',
  '神崎｜信江': '神﨑｜信江',
  '小柳｜瑞穂': '小栁｜瑞穂',
  '笹島｜光弘': '笹嶋｜光弘',
  '濵﨑｜貴美': '濵崎｜貴美',
  '藪｜知子': '薮｜知子',
  '吉富｜綾花': '吉冨｜綾花',
  '吉田｜こころ': '塚本｜こころ'
};
const JFOLD = {'﨑':'崎','嵜':'崎','髙':'高','濵':'浜','濱':'浜','邊':'辺','邉':'辺','齋':'斎','齊':'斎','斉':'斎','瀨':'瀬','栁':'柳','德':'徳','眞':'真','冨':'富','桒':'桑','藪':'薮','籔':'薮','淺':'浅','澤':'沢','薗':'園','嶌':'島','嶋':'島','曻':'昇'};
function jfold(s){ return [...s].map(c => JFOLD[c] || c).join(''); }
function workOf(e){
  if(e.w) return e.w;
  const p = findPerson(e);
  return p ? (p.w || p.b) : e.b;
}
function findPerson(e){
  if(!e.pid) return null;
  const pid = PID_ALIAS[e.pid] || e.pid;
  let p = PEOPLE.find(x => personKey(x) === pid);
  if(p) return p;
  // 異体字ゆらぎで一致しない場合
  const key = jfold(pid.replace('｜', ''));
  p = PEOPLE.find(x => jfold(x.s + x.m) === key);
  return p || null;
}
function resolveByName(name){
  const nm = (name || '').replace(/[\s\u3000]/g, '');
  let p = PEOPLE.find(x => (x.s + x.m) === nm) || PEOPLE.find(x => jfold(x.s + x.m) === jfold(nm));
  if(!p){
    const parts = (name || '').replace(/\u3000/g, ' ').trim().split(/\s+/);
    if(parts.length >= 2){
      const ali = PID_ALIAS[parts[0] + '｜' + parts.slice(1).join('')];
      if(ali) p = PEOPLE.find(x => personKey(x) === ali);
    }
  }
  return p || null;
}
// 旧形式・旧漢字・旧姓のストックを現在の名簿に繋ぎ直す
STOCK.forEach(e => {
  const p = findPerson(e) || resolveByName(e.name);
  if(p){
    // 手修正（✎）した名前は触らない。それ以外は正しい表記に更新
    if(!e.ed) e.name = p.s + '　' + p.m;
    e.pid = personKey(p);
  }
  delete e.i;
});
saveStock();

function orgOptions(p){ return ['中央', p.b === '関連評' ? '関連評' : p.b + '支部', '青年部']; }

function nextHTML(p, i){
  let h = '<div class="next-box" data-i="' + i + '">';
  STOCK.forEach((e, si) => {
    if(e.pid === personKey(p)) h += '<span class="next-badge">次期 ' + esc(e.org) + '・' + esc(e.role) + '<button class="bx" data-si="' + si + '" aria-label="取消">×</button></span>';
  });
  h += '<button class="next-btn">＋ 次期役員に追加</button></div>';
  return h;
}

function redrawDetail(row){
  row.querySelector('.detail').innerHTML = detailHTML(PEOPLE[+row.dataset.i], +row.dataset.i);
}
function refreshStockUI(){
  document.querySelectorAll('#list .row.open').forEach(redrawDetail);
  stockBtn.textContent = '次期役員（' + STOCK.length + '）';
  stockBtn.classList.toggle('has', STOCK.length > 0);
  renderStockPanel();
}
const ROLE_ORDER = {'執行委員長':0,'副執行委員長':1,'書記長':2,'書記次長':3,'執行委員':4,'会計監査':5,'部長':0,'副部長':1,'常任幹事':4};
function orgOrder(o){ return o === '中央' ? 0 : o === '青年部' ? 2 : 1; }
function stockGroups(){
  const orgs = [...new Set(STOCK.map(e => e.org))].sort((a,b) => orgOrder(a) - orgOrder(b));
  return orgs.map(org => [org, STOCK.map((e, si) => [e, si]).filter(([e]) => e.org === org)
    .sort(([a],[b]) => (ROLE_ORDER[a.role] ?? 9) - (ROLE_ORDER[b.role] ?? 9))]);
}
let chooseMode = null;
let orgSel = {};
let editSi = null;
function renderStockPanel(){
  if(!STOCK.length){
    stockPanel.innerHTML = '<div class="stock-empty">まだ空です。名前を開いて「＋ 次期役員に追加」で選ぶとここに溜まります。</div>';
    return;
  }
  let actions;
  if(chooseMode){
    const label = chooseMode === 'ballot' ? '投票用紙' : '役員案PDF';
    actions = '<div class="sel-tools"><span class="pick-label">' + label + '：どれを出す？</span></div>' +
      '<div class="sel-tools orgs">' + stockGroups().map(([org]) =>
        '<button class="orgc-line orgc' + (orgSel[org] ? ' on' : '') + '" data-org="' + esc(org) + '"><span class="selc' + (orgSel[org] ? ' on' : '') + '">✓</span>' + esc(org) + '</button>'
      ).join('') + '</div>' +
      '<div class="sel-tools"><button id="selAll">全部</button><button id="selNone">全部解除</button><button id="prevBtn">プレビュー</button><button id="goBtn">作成する</button><button id="cancelSel">やめる</button></div>';
  } else {
    actions = '<div class="stock-actions"><button id="ballotBtn">投票用紙PDF</button><button id="pdfBtn">PDFにする</button></div>';
  }
  stockPanel.innerHTML = stockGroups().map(([org, entries]) =>
    '<div class="org"><div class="org-name">' + esc(org) + '</div>' +
    entries.map(([e, si]) =>
      si === editSi
      ? '<div class="stock-line edit"><span class="lbl">' + esc(e.role) + '　<input class="nmedit" data-si="' + si + '" value="' + esc(e.name) + '" placeholder="名前">　<input class="wkedit" data-si="' + si + '" value="' + esc(workOf(e)) + '" placeholder="職場"></span><button class="edok" data-si="' + si + '">保存</button><button class="edng">やめる</button></div>'
      : '<div class="stock-line"><span class="lbl">' + esc(e.role) + '　<b>' + esc(e.name) + '</b>（' + esc(workOf(e)) + '）</span><button class="ed" data-si="' + si + '" aria-label="修正">✎</button><button class="bx" data-si="' + si + '" aria-label="取消">×</button></div>'
    ).join('') + '</div>'
  ).join('') + actions;
}

function toKanji(n){
  if(typeof n !== 'number') return String(n);
  const K = ['','一','二','三','四','五','六','七','八','九'];
  if(n < 10) return K[n];
  const tens = Math.floor(n / 10), ones = n % 10;
  return (tens > 1 ? K[tens] : '') + '十' + K[ones];
}
function careerText(p){
  if(!p.roles.length) return '役員歴なし';
  return p.roles.map(r => {
    const org = r.g === '中央執行部' ? '中央' : r.g;
    return org + r.r + toKanji(r.t) + '期';
  }).join('　');
}
function btnMsg(btn, msg){
  if(!btn) return;
  btn.textContent = msg;
  setTimeout(() => { btn.disabled = false; btn.textContent = 'PDFにする'; }, 3000);
}
let FONT_B64 = null;
async function loadFont(){
  if(FONT_B64) return FONT_B64;
  const buf = await (await fetch('ipaexg.ttf')).arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  for(let i = 0; i < bytes.length; i += 0x8000){
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  }
  FONT_B64 = btoa(bin);
  return FONT_B64;
}
async function makeJPDF(format){
  const pdf = new jspdf.jsPDF({orientation: 'p', unit: 'mm', format: format || 'a4'});
  pdf.addFileToVFS('ipaexg.ttf', await loadFont());
  pdf.addFont('ipaexg.ttf', 'ipaexg', 'normal');
  pdf.setFont('ipaexg');
  return pdf;
}
async function deliverFiles(items, title){
  if(navigator.canShare){
    const files = items.map(x => new File([x.pdf.output('blob')], x.fname, {type: 'application/pdf'}));
    if(navigator.canShare({files})){
      try{
        await navigator.share({files, title});
        return;
      }catch(shareErr){
        if(shareErr.name === 'AbortError') return;
      }
    }
  }
  items.forEach((x, i) => setTimeout(() => x.pdf.save(x.fname), i * 400));
}
function stampName(base, org){
  const d = new Date();
  return base + (org ? '_' + org : '') + '_' + d.getFullYear() + (d.getMonth()+101+'').slice(1) + (d.getDate()+100+'').slice(1) + '.pdf';
}
async function printStock(groups){
  const btn = document.getElementById('pdfBtn');
  if(!window.jspdf || !window.jspdf.jsPDF.API.autoTable){
    btnMsg(btn, '部品の読込失敗。電波確認して再読込を');
    return;
  }
  if(btn){ btn.disabled = true; btn.textContent = '作成中…'; }
  try{
    const d = new Date();
    const dateStr = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    const items = [];
    for(const [org, entries] of groups){
      const pdf = await makeJPDF('a4');
      pdf.setFontSize(16);
      pdf.text('次期役員（案）　' + org, 14, 18);
      pdf.setFontSize(9);
      pdf.text(dateStr + '　岸和田市職労', 196, 18, {align: 'right'});
      const body = entries.map(([e]) => {
        const p = findPerson(e);
        return [e.role, e.name, workOf(e), p ? careerText(p) : ''];
      });
      pdf.autoTable({
        startY: 26,
        head: [['役職', '名前', '職場', '経歴']],
        body,
        styles: {font: 'ipaexg', fontStyle: 'normal', fontSize: 9.5, cellPadding: 1.8, lineColor: [60,60,60], lineWidth: 0.25, textColor: [0,0,0]},
        headStyles: {fillColor: [235,235,235], textColor: [0,0,0], fontStyle: 'normal'},
        columnStyles: {0: {cellWidth: 26}, 1: {cellWidth: 32}, 2: {cellWidth: 38}},
        margin: {left: 14, right: 14},
        theme: 'grid'
      });
      items.push({pdf, fname: stampName('次期役員案', org)});
    }
    await deliverFiles(items, '次期役員（案）');
    btnMsg(btn, 'できた');
  }catch(err){
    btnMsg(btn, '失敗: ' + (err.message || err).toString().slice(0, 40));
  }finally{
    if(btn) btn.disabled = false;
  }
}

// ---- 投票用紙PDF ----
function jchars(s){
  const chars = [...s.replace(/[\s\u3000]/g, '')];
  if(chars.length <= 1) return '<span class="jone">' + esc(s) + '</span>';
  return '<div class="jrow">' + chars.map(c => '<span>' + esc(c) + '</span>').join('') + '</div>';
}
function ballotHTML(org, entries){
  const year = 2027;
  const orgName = org === '中央' ? '中央役員候補' : org + '役員候補';
  let rows = '';
  let prevRole = null;
  for(const [e] of entries){
    const work = workOf(e);
    const roleCell = (e.role === prevRole) ? '<span class="jone">同</span>' : jchars(e.role);
    prevRole = e.role;
    rows += '<tr><td class="cRole">' + roleCell + '</td>' +
      '<td class="cName">' + jchars(e.name) + '</td>' +
      '<td class="cWork">' + jchars(work) + '</td>' +
      '<td class="cVote"></td></tr>';
  }
  return '<div class="bwrap">' +
    '<div class="btitle">' + year + '年度・役員選挙投票用紙</div>' +
    '<div class="bsub">' + esc(orgName) + '</div>' +
    '<table class="btable"><tr>' +
    '<th class="cRole">' + jchars('役職名') + '</th>' +
    '<th class="cName">' + jchars('立候補者名') + '</th>' +
    '<th class="cWork">' + jchars('職場名') + '</th>' +
    '<th class="cVote">' + jchars('投票欄') + '</th></tr>' + rows + '</table>' +
    '<div class="bnotes">信任は○、不信任は×を投票欄にそれぞれ記入してください。<br>無記入は信任とみなします。' +
    '<div class="bsign">2026年7月13日～17日実施<br>岸和田市職員労働組合選挙管理委員会<br>委員長　　西山　純平</div></div></div>';
}
async function printBallots(groups){
  const btn = document.getElementById('ballotBtn');
  if(!window.html2canvas || !window.jspdf){
    if(btn){ btn.textContent = '部品の読込失敗。再読込を'; setTimeout(() => { btn.textContent = '投票用紙PDF'; }, 4000); }
    return;
  }
  const ps = document.getElementById('printSheet');
  if(btn){ btn.disabled = true; btn.textContent = '作成中…'; }
  ps.classList.add('capture', 'ballot');
  try{
    const items = [];
    for(const [org, entries] of groups){
      ps.innerHTML = ballotHTML(org, entries);
      const canvas = await html2canvas(ps, {scale: 2, backgroundColor: '#ffffff'});
      const pdf = new jspdf.jsPDF({orientation: 'p', unit: 'mm', format: 'a4'});
      let w = 210, hh = canvas.height * 210 / canvas.width;
      if(hh > 297){ hh = 297; w = canvas.width * 297 / canvas.height; }
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', (210 - w) / 2, 0, w, hh);
      items.push({pdf, fname: stampName('投票用紙', org)});
    }
    await deliverFiles(items, '投票用紙');
    if(btn){ btn.disabled = false; btn.textContent = '投票用紙PDF'; }
  }catch(err){
    if(btn) btn.textContent = '失敗: ' + (err.message || err).toString().slice(0, 40);
    setTimeout(() => { if(btn) btn.textContent = '投票用紙PDF'; }, 4000);
  }finally{
    ps.classList.remove('capture', 'ballot');
    ps.innerHTML = '';
    if(btn && btn.textContent === '作成中…'){ btn.textContent = '投票用紙PDF'; }
    if(btn) btn.disabled = false;
  }
}
stockBtn.addEventListener('click', () => {
  stockPanel.hidden = !stockPanel.hidden;
  renderStockPanel();
});
function openChooser(mode){
  chooseMode = mode;
  orgSel = {};
  stockGroups().forEach(([org]) => { orgSel[org] = true; });
  renderStockPanel();
}
stockPanel.addEventListener('click', e => {
  if(e.target.closest('#pdfBtn')){ openChooser('list'); return; }
  if(e.target.closest('#ballotBtn')){ openChooser('ballot'); return; }
  if(e.target.closest('#selAll')){ Object.keys(orgSel).forEach(o => orgSel[o] = true); renderStockPanel(); return; }
  if(e.target.closest('#selNone')){ Object.keys(orgSel).forEach(o => orgSel[o] = false); renderStockPanel(); return; }
  if(e.target.closest('#cancelSel')){ chooseMode = null; renderStockPanel(); return; }
  const oc = e.target.closest('.orgc');
  if(oc){ orgSel[oc.dataset.org] = !orgSel[oc.dataset.org]; renderStockPanel(); return; }
  if(e.target.closest('#prevBtn')){ showPreview(); return; }
  if(e.target.closest('#goBtn')){
    const groups = stockGroups().filter(([org]) => orgSel[org]);
    const mode = chooseMode;
    chooseMode = null;
    renderStockPanel();
    if(!groups.length) return;
    if(mode === 'ballot') printBallots(groups); else printStock(groups);
    return;
  }
  const ed = e.target.closest('.ed');
  if(ed){ editSi = +ed.dataset.si; renderStockPanel(); const inp = stockPanel.querySelector('.nmedit'); if(inp){ inp.focus(); inp.select(); } return; }
  if(e.target.closest('.edng')){ editSi = null; renderStockPanel(); return; }
  const ok = e.target.closest('.edok');
  if(ok){ saveNameEdit(+ok.dataset.si); return; }
  const bx = e.target.closest('.bx');
  if(bx){ STOCK.splice(+bx.dataset.si, 1); saveStock(); editSi = null; refreshStockUI(); }
});
function showPreview(){
  const groups = stockGroups().filter(([org]) => orgSel[org]);
  if(!groups.length) return;
  const body = document.getElementById('pvBody');
  const d = new Date();
  const dateStr = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  if(chooseMode === 'ballot'){
    document.getElementById('pvTitle').textContent = '投票用紙プレビュー';
    body.innerHTML = groups.map(([org, entries]) =>
      '<div class="pv-page"><div class="psheet pv-ballot">' + ballotHTML(org, entries) + '</div></div>'
    ).join('');
    requestAnimationFrame(() => {
      body.querySelectorAll('.pv-page').forEach(page => {
        const inner = page.firstChild;
        const s = Math.min(1, (page.clientWidth || body.clientWidth) / 736);
        inner.style.transform = 'scale(' + s + ')';
        page.style.height = (inner.offsetHeight * s) + 'px';
      });
    });
  } else {
    document.getElementById('pvTitle').textContent = '役員案PDFプレビュー';
    body.innerHTML = '<div class="psheet pv-list"><h1>次期役員（案）</h1><div class="pdate">' + dateStr + '　岸和田市職労</div>' +
      groups.map(([org, entries]) =>
        '<h2>' + esc(org) + '</h2><table><tr><th>役職</th><th>名前</th><th>職場</th><th>経歴</th></tr>' +
        entries.map(([e]) => {
          const p = findPerson(e);
          return '<tr><td class="po">' + esc(e.role) + '</td><td class="pn">' + esc(e.name) + '</td><td class="pb">' + esc(workOf(e)) + '</td><td>' + esc(p ? careerText(p) : '') + '</td></tr>';
        }).join('') + '</table>'
      ).join('') + '</div>';
  }
  document.getElementById('pvOverlay').hidden = false;
}
document.getElementById('pvClose').addEventListener('click', () => { document.getElementById('pvOverlay').hidden = true; });
document.getElementById('pvOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('pvOverlay')) document.getElementById('pvOverlay').hidden = true;
});
function saveNameEdit(si){
  const inp = stockPanel.querySelector('.nmedit');
  if(inp){
    const v = inp.value.trim();
    if(v && v.replace(/ /g, '　') !== STOCK[si].name){ STOCK[si].name = v.replace(/ /g, '　'); STOCK[si].ed = 1; }
  }
  const wk = stockPanel.querySelector('.wkedit');
  if(wk){
    const v = wk.value.trim();
    const e = STOCK[si];
    const p = findPerson(e);
    const def = p ? (p.w || p.b) : e.b;
    if(!v || v === def) delete e.w; else e.w = v;
  }
  editSi = null;
  saveStock();
  refreshStockUI();
}
stockPanel.addEventListener('keydown', e => {
  if(e.key === 'Enter' && (e.target.classList.contains('nmedit') || e.target.classList.contains('wkedit'))){
    e.preventDefault();
    saveNameEdit(+e.target.dataset.si);
  }
});

listEl.addEventListener('click', e => {
  const bx = e.target.closest('.bx');
  if(bx){ STOCK.splice(+bx.dataset.si, 1); saveStock(); refreshStockUI(); return; }
  const nb = e.target.closest('.next-btn');
  if(nb){
    const box = nb.closest('.next-box');
    const p = PEOPLE[+box.dataset.i];
    nb.outerHTML = '<span class="pick-label">どこの役？</span>' +
      orgOptions(p).map(o => '<button class="chip org-chip" data-org="' + esc(o) + '">' + esc(o) + '</button>').join('') +
      '<button class="chip cancel">やめる</button>';
    return;
  }
  if(e.target.closest('.cancel')){ redrawDetail(e.target.closest('.row')); return; }
  const oc = e.target.closest('.org-chip');
  if(oc){
    const box = oc.closest('.next-box');
    const org = oc.dataset.org;
    const roles = org === '青年部' ? SEINEN_ROLES : ROLES;
    box.innerHTML = '<span class="pick-label">' + esc(org) + '：</span>' +
      roles.map(r => '<button class="chip role-chip" data-org="' + esc(org) + '" data-role="' + esc(r) + '">' + esc(r) + '</button>').join('') +
      '<button class="chip cancel">やめる</button>';
    return;
  }
  const rc = e.target.closest('.role-chip');
  if(rc){
    const box = rc.closest('.next-box');
    const p = PEOPLE[+box.dataset.i];
    const pid = personKey(p);
    if(!STOCK.some(x => x.pid === pid && x.org === rc.dataset.org && x.role === rc.dataset.role)){
      STOCK.push({pid, name: p.s + '　' + p.m, b: p.b, org: rc.dataset.org, role: rc.dataset.role});
      saveStock();
    }
    refreshStockUI();
    return;
  }
  const head = e.target.closest('.row-head');
  if(!head) return;
  const row = head.parentElement;
  const opening = !row.classList.contains('open');
  if(opening){
    const detail = row.querySelector('.detail');
    if(!detail.innerHTML) detail.innerHTML = detailHTML(PEOPLE[+row.dataset.i], +row.dataset.i);
  }
  row.classList.toggle('open', opening);
  head.setAttribute('aria-expanded', opening);
});

document.getElementById('shibuBar').addEventListener('click', e => {
  const sf = e.target.closest('.sf');
  if(!sf) return;
  shibuFilter = sf.dataset.b;
  document.querySelectorAll('#shibuBar .sf').forEach(b => b.classList.toggle('on', b === sf));
  render();
});

qEl.addEventListener('input', render);
render();
refreshStockUI();
</script>
